<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de QR Code - Mi 50 Anos</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            font-family: 'Poppins', 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #16213e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* PARTÍCULAS DE FUNDO */
        .particles-bg {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            background: radial-gradient(circle, #ffd700, #ffed4e);
            border-radius: 50%;
            opacity: 0.6;
            filter: blur(1px);
        }

        /* CONTAINER PRINCIPAL */
        .container {
            position: relative;
            z-index: 10;
            max-width: 1000px;
            width: 100%;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border: 2px solid #d4af37;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 
                0 30px 80px rgba(212, 175, 55, 0.2),
                inset 0 0 30px rgba(212, 175, 55, 0.05);
            animation: slideIn 0.8s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            animation: slideDown 0.6s ease;
        }

        .header h1 {
            font-size: clamp(28px, 5vw, 44px);
            color: #d4af37;
            margin-bottom: 10px;
            font-weight: 300;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .header p {
            font-size: clamp(14px, 2vw, 18px);
            color: #b89f3f;
            font-weight: 300;
            letter-spacing: 1px;
        }

        .content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            animation: slideDown 0.6s ease 0.1s both;
        }

        @media (max-width: 768px) {
            .content {
                grid-template-columns: 1fr;
                gap: 30px;
            }

            .container {
                padding: 25px;
            }
        }

        /* SEÇÃO DE ENTRADA */
        .input-section {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            animation: slideDown 0.6s ease calc(0.2s + var(--index) * 0.1s) both;
        }

        .form-group label {
            color: #d4af37;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .form-group input,
        .form-group select {
            padding: 12px 16px;
            border: 2px solid #d4af37;
            border-radius: 8px;
            background: rgba(212, 175, 55, 0.05);
            color: white;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            background: rgba(212, 175, 55, 0.1);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
            border-color: #f0d555;
        }

        .form-group input::placeholder {
            color: #8b7e3e;
        }

        /* BOTÕES */
        .button-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        .btn {
            flex: 1;
            min-width: 120px;
            padding: 12px 20px;
            border: 2px solid #d4af37;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 1px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #d4af37, #f0d555);
            color: #1a1a2e;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(212, 175, 55, 0.4);
        }

        .btn-secondary {
            background: transparent;
            color: #d4af37;
        }

        .btn-secondary:hover {
            background: rgba(212, 175, 55, 0.1);
            transform: translateY(-3px);
        }

        .btn:active {
            transform: translateY(-1px);
        }

        /* SEÇÃO QR CODE */
        .qrcode-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            animation: slideDown 0.6s ease 0.3s both;
        }

        .qrcode-container {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 300px;
            width: 100%;
            max-width: 300px;
        }

        #qrcode {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .qrcode-info {
            text-align: center;
            color: #d4af37;
            width: 100%;
        }

        .qrcode-link {
            background: rgba(212, 175, 55, 0.1);
            border: 1px solid #d4af37;
            border-radius: 8px;
            padding: 12px;
            margin: 10px 0;
            word-break: break-all;
            font-size: 12px;
            color: #b89f3f;
            transition: all 0.3s ease;
            max-height: 100px;
            overflow-y: auto;
        }

        .qrcode-link:hover {
            background: rgba(212, 175, 55, 0.2);
        }

        /* LISTA DE CONVIDADOS */
        .guests-section {
            margin-top: 40px;
            animation: slideDown 0.6s ease 0.4s both;
        }

        .guests-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            gap: 10px;
            flex-wrap: wrap;
        }

        .guests-header h2 {
            color: #d4af37;
            font-size: clamp(18px, 3vw, 24px);
            font-weight: 300;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .guest-stats {
            background: rgba(212, 175, 55, 0.1);
            border: 1px solid #d4af37;
            padding: 8px 16px;
            border-radius: 20px;
            color: #d4af37;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .guests-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
            max-height: 500px;
            overflow-y: auto;
        }

        .guest-card {
            background: rgba(212, 175, 55, 0.05);
            border: 1px solid #d4af37;
            border-radius: 8px;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
            animation: fadeIn 0.4s ease;
        }

        .guest-card:hover {
            background: rgba(212, 175, 55, 0.1);
            transform: translateY(-2px);
        }

        .guest-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
            flex: 1;
            min-width: 0;
        }

        .guest-name {
            color: #d4af37;
            font-weight: 600;
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .guest-link {
            color: #8b7e3e;
            font-size: 11px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .guest-link:hover {
            color: #b89f3f;
        }

        .guest-actions {
            display: flex;
            gap: 8px;
        }

        .icon-btn {
            background: transparent;
            border: 1px solid #d4af37;
            color: #d4af37;
            width: 30px;
            height: 30px;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            font-size: 12px;
        }

        .icon-btn:hover {
            background: #d4af37;
            color: #1a1a2e;
        }

        /* DOWNLOAD SECTION */
        .download-section {
            background: rgba(212, 175, 55, 0.1);
            border: 1px solid #d4af37;
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
            text-align: center;
            animation: slideDown 0.6s ease 0.5s both;
        }

        .download-section h3 {
            color: #d4af37;
            font-size: 14px;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .download-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .download-btn {
            background: linear-gradient(135deg, #d4af37, #f0d555);
            color: #1a1a2e;
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(212, 175, 55, 0.3);
        }

        /* MENSAGENS */
        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            margin: 10px 0;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: slideDown 0.4s ease;
        }

        .alert-success {
            background: rgba(76, 175, 80, 0.1);
            border: 1px solid #4caf50;
            color: #4caf50;
        }

        .alert-error {
            background: rgba(244, 67, 54, 0.1);
            border: 1px solid #f44336;
            color: #f44336;
        }

        .alert-info {
            background: rgba(33, 150, 243, 0.1);
            border: 1px solid #2196f3;
            color: #2196f3;
        }

        /* ANIMAÇÕES */
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes floatParticle {
            0% {
                transform: translateY(0px) translateX(0px) rotate(0deg);
                opacity: 0.6;
            }
            50% {
                opacity: 0.3;
            }
            100% {
                transform: translateY(-100vh) translateX(100px) rotate(360deg);
                opacity: 0;
            }
        }

        /* SCROLL */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(212, 175, 55, 0.05);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: #d4af37;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #f0d555;
        }

        /* PERFORMANCE */
        * {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .particle {
            will-change: transform;
        }
    </style>
</head>
<body>
    <!-- PARTÍCULAS DE FUNDO -->
    <div class="particles-bg" id="particlesBg"></div>

    <!-- CONTAINER PRINCIPAL -->
    <div class="container">
        <!-- HEADER -->
        <div class="header">
            <h1>Gerador de QR Code</h1>
            <p>Crie convites personalizados para seus convidados 🎁</p>
        </div>

        <!-- CONTEÚDO PRINCIPAL -->
        <div class="content">
            <!-- SEÇÃO DE ENTRADA -->
            <div class="input-section">
                <div class="form-group" style="--index: 0">
                    <label for="guestName">Nome do Convidado</label>
                    <input 
                        type="text" 
                        id="guestName" 
                        placeholder="Ex: João Silva"
                        autocomplete="off"
                    >
                </div>

                <div class="form-group" style="--index: 1">
                    <label for="guestEmail">Email (Opcional)</label>
                    <input 
                        type="email" 
                        id="guestEmail" 
                        placeholder="joao@example.com"
                        autocomplete="off"
                    >
                </div>

                <div class="form-group" style="--index: 2">
                    <label for="guestPhone">WhatsApp (Opcional)</label>
                    <input 
                        type="tel" 
                        id="guestPhone" 
                        placeholder="+55 11 99999-9999"
                        autocomplete="off"
                    >
                </div>

                <div class="form-group" style="--index: 3">
                    <label for="baseUrl">URL Base</label>
                    <input 
                        type="text" 
                        id="baseUrl" 
                        placeholder="https://seu-dominio.com/index-3d.html"
                        value="https://emileneribeiroleandro-coder.github.io/mi-50-anos/index-3d.html"
                        autocomplete="off"
                    >
                </div>

                <div class="form-group" style="--index: 4">
                    <label for="qrSize">Tamanho do QR Code</label>
                    <select id="qrSize">
                        <option value="150">Pequeno (150x150)</option>
                        <option value="250" selected>Médio (250x250)</option>
                        <option value="350">Grande (350x350)</option>
                        <option value="500">Muito Grande (500x500)</option>
                    </select>
                </div>

                <div class="button-group">
                    <button class="btn btn-primary" onclick="generateQRCode()">
                        <i class="fas fa-qrcode"></i> Gerar QR Code
                    </button>
                    <button class="btn btn-secondary" onclick="clearForm()">
                        <i class="fas fa-trash"></i> Limpar
                    </button>
                </div>

                <div id="messages"></div>
            </div>

            <!-- SEÇÃO QR CODE -->
            <div class="qrcode-section">
                <div class="qrcode-container">
                    <div id="qrcode"></div>
                </div>

                <div class="qrcode-info">
                    <p>QR Code gerado para:</p>
                    <div id="guestDisplayName" style="font-weight: 600; color: #f0d555; margin: 8px 0;">-</div>
                    <div class="qrcode-link" id="qrcodeLink" onclick="copyToClipboard(this.textContent)">
                        Clique para copiar o link
                    </div>
                </div>

                <div class="download-section" id="downloadSection" style="display: none;">
                    <h3>Baixar QR Code</h3>
                    <div class="download-buttons">
                        <button class="download-btn" onclick="downloadQRCode('png')">
                            <i class="fas fa-image"></i> PNG
                        </button>
                        <button class="download-btn" onclick="downloadQRCode('jpg')">
                            <i class="fas fa-image"></i> JPG
                        </button>
                        <button class="download-btn" onclick="downloadQRCode('svg')">
                            <i class="fas fa-vector-square"></i> SVG
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- SEÇÃO DE CONVIDADOS -->
        <div class="guests-section">
            <div class="guests-header">
                <h2>Convidados Gerados</h2>
                <div class="guest-stats" id="guestStats">0 Convidados</div>
                <button class="btn btn-secondary" style="padding: 8px 16px; font-size: 12px;" onclick="exportGuestsCSV()">
                    <i class="fas fa-download"></i> Exportar CSV
                </button>
            </div>

            <div class="guests-list" id="guestsList">
                <div style="grid-column: 1 / -1; text-align: center; color: #8b7e3e; padding: 40px 20px;">
                    <i class="fas fa-inbox" style="font-size: 32px; margin-bottom: 12px; display: block;"></i>
                    Nenhum convidado adicionado ainda
                </div>
            </div>
        </div>
    </div>

    <script>
        // ========== VARIÁVEIS GLOBAIS ==========
        let guests = [];
        let currentQRCode = null;
        const baseUrlInput = document.getElementById('baseUrl');

        // ========== CARREGAR DADOS DO LOCALSTORAGE ==========
        function loadGuests() {
            const saved = localStorage.getItem('mi50guests');
            if (saved) {
                guests = JSON.parse(saved);
                renderGuestsList();
            }
        }

        function saveGuests() {
            localStorage.setItem('mi50guests', JSON.stringify(guests));
        }

        // ========== GERAR QR CODE ==========
        function generateQRCode() {
            const name = document.getElementById('guestName').value.trim();
            const email = document.getElementById('guestEmail').value.trim();
            const phone = document.getElementById('guestPhone').value.trim();
            const baseUrl = baseUrlInput.value.trim();
            const size = parseInt(document.getElementById('qrSize').value);

            if (!name) {
                showMessage('Por favor, digite o nome do convidado', 'error');
                return;
            }

            if (!baseUrl) {
                showMessage('Por favor, configure a URL base', 'error');
                return;
            }

            // Criar URL com parâmetro do nome
            const encodedName = encodeURIComponent(name);
            const fullUrl = `${baseUrl}?name=${encodedName}`;

            // Limpar QR code anterior
            document.getElementById('qrcode').innerHTML = '';

            // Gerar novo QR Code
            currentQRCode = new QRCode(document.getElementById('qrcode'), {
                text: fullUrl,
                width: size,
                height: size,
                colorDark: '#000000',
                colorLight: '#ffffff',
                correctLevel: QRCode.CorrectLevel.H
            });

            // Atualizar informações
            document.getElementById('guestDisplayName').textContent = name;
            document.getElementById('qrcodeLink').textContent = fullUrl;
            document.getElementById('downloadSection').style.display = 'block';

            showMessage(`QR Code gerado com sucesso para ${name}!`, 'success');

            // Adicionar convidado à lista
            const guest = {
                id: Date.now(),
                name: name,
                email: email,
                phone: phone,
                url: fullUrl,
                createdAt: new Date().toLocaleString('pt-BR')
            };

            guests.unshift(guest);
            saveGuests();
            renderGuestsList();

            // Scroll para lista de convidados
            setTimeout(() => {
                document.querySelector('.guests-section').scrollIntoView({ behavior: 'smooth' });
            }, 500);
        }

        // ========== RENDERIZAR LISTA DE CONVIDADOS ==========
        function renderGuestsList() {
            const list = document.getElementById('guestsList');

            if (guests.length === 0) {
                list.innerHTML = `
                    <div style="grid-column: 1 / -1; text-align: center; color: #8b7e3e; padding: 40px 20px;">
                        <i class="fas fa-inbox" style="font-size: 32px; margin-bottom: 12px; display: block;"></i>
                        Nenhum convidado adicionado ainda
                    </div>
                `;
                document.getElementById('guestStats').textContent = '0 Convidados';
                return;
            }

            list.innerHTML = guests.map(guest => `
                <div class="guest-card">
                    <div class="guest-info">
                        <div class="guest-name" title="${guest.name}">👤 ${guest.name}</div>
                        <div class="guest-link" title="${guest.url}" onclick="event.stopPropagation(); copyToClipboard('${guest.url}')">
                            ${guest.url.substring(0, 40)}...
                        </div>
                        <div style="font-size: 10px; color: #8b7e3e;">
                            ${guest.createdAt}
                        </div>
                    </div>
                    <div class="guest-actions">
                        <button class="icon-btn" onclick="copyGuestLink('${guest.url}')" title="Copiar link">
                            <i class="fas fa-copy"></i>
                        </button>
                        <button class="icon-btn" onclick="generateGuestQRCode('${guest.id}')" title="Ver QR Code">
                            <i class="fas fa-qrcode"></i>
                        </button>
                        <button class="icon-btn" onclick="deleteGuest('${guest.id}')" title="Remover">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                </div>
            `).join('');

            document.getElementById('guestStats').textContent = `${guests.length} Convidado${guests.length !== 1 ? 's' : ''}`;
        }

        // ========== GERAR QR CODE DO CONVIDADO ==========
        function generateGuestQRCode(guestId) {
            const guest = guests.find(g => g.id == guestId);
            if (!guest) return;

            document.getElementById('guestName').value = guest.name;
            document.getElementById('guestEmail').value = guest.email;
            document.getElementById('guestPhone').value = guest.phone;

            document.getElementById('qrcode').innerHTML = '';
            currentQRCode = new QRCode(document.getElementById('qrcode'), {
                text: guest.url,
                width: parseInt(document.getElementById('qrSize').value),
                height: parseInt(document.getElementById('qrSize').value),
                colorDark: '#000000',
                colorLight: '#ffffff',
                correctLevel: QRCode.CorrectLevel.H
            });

            document.getElementById('guestDisplayName').textContent = guest.name;
            document.getElementById('qrcodeLink').textContent = guest.url;
            document.getElementById('downloadSection').style.display = 'block';

            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // ========== COPIAR PARA ÁREA DE TRANSFERÊNCIA ==========
        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                showMessage('Link copiado para a área de transferência! ✓', 'success');
            }).catch(() => {
                showMessage('Erro ao copiar para a área de transferência', 'error');
            });
        }

        function copyGuestLink(url) {
            copyToClipboard(url);
        }

        // ========== REMOVER CONVIDADO ==========
        function deleteGuest(guestId) {
            if (confirm('Tem certeza que deseja remover este convidado?')) {
                guests = guests.filter(g => g.id != guestId);
                saveGuests();
                renderGuestsList();
                showMessage('Convidado removido com sucesso', 'success');
            }
        }

        // ========== BAIXAR QR CODE ==========
        function downloadQRCode(format) {
            const qrImage = document.querySelector('#qrcode img');
            if (!qrImage) {
                showMessage('Por favor, gere um QR Code primeiro', 'error');
                return;
            }

            const name = document.getElementById('guestName').value || 'qrcode';
            const timestamp = new Date().toLocaleString('pt-BR', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' }).replace(/[\/:\s]/g, '-');
            const filename = `mi50-${name}-${timestamp}`;

            if (format === 'png' || format === 'jpg') {
                const link = document.createElement('a');
                link.href = qrImage.src;
                link.download = `${filename}.${format}`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);

                showMessage(`QR Code baixado como ${format.toUpperCase()}`, 'success');
            }
        }

        // ========== EXPORTAR PARA CSV ==========
        function exportGuestsCSV() {
            if (guests.length === 0) {
                showMessage('Nenhum convidado para exportar', 'info');
                return;
            }

            let csv = 'Nome,Email,WhatsApp,URL,Data de Criação\n';
            guests.forEach(guest => {
                csv += `"${guest.name}","${guest.email}","${guest.phone}","${guest.url}","${guest.createdAt}"\n`;
            });

            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            const url = URL.createObjectURL(blob);

            link.setAttribute('href', url);
            link.setAttribute('download', `convidados-mi50-${new Date().toISOString().split('T')[0]}.csv`);
            link.style.visibility = 'hidden';

            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);

            showMessage(`${guests.length} convidado${guests.length !== 1 ? 's' : ''} exportado${guests.length !== 1 ? 's' : ''} com sucesso!`, 'success');
        }

        // ========== LIMPAR FORMULÁRIO ==========
        function clearForm() {
            document.getElementById('guestName').value = '';
            document.getElementById('guestEmail').value = '';
            document.getElementById('guestPhone').value = '';
            document.getElementById('qrcode').innerHTML = '';
            document.getElementById('guestDisplayName').textContent = '-';
            document.getElementById('qrcodeLink').textContent = 'Clique para copiar o link';
            document.getElementById('downloadSection').style.display = 'none';
            document.getElementById('messages').innerHTML = '';
        }

        // ========== MOSTRAR MENSAGENS ==========
        function showMessage(text, type = 'info') {
            const messagesDiv = document.getElementById('messages');
            const alert = document.createElement('div');
            alert.className = `alert alert-${type}`;
            alert.innerHTML = `
                <i class="fas fa-${type === 'success' ? 'check-circle' : type === 'error' ? 'exclamation-circle' : 'info-circle'}"></i>
                <span>${text}</span>
            `;

            messagesDiv.appendChild(alert);

            setTimeout(() => {
                alert.style.opacity = '0';
                setTimeout(() => alert.remove(), 300);
            }, 4000);
        }

        // ========== CRIAR PARTÍCULAS ==========
        function createParticles() {
            const container = document.getElementById('particlesBg');
            const particleCount = window.innerWidth > 768 ? 30 : 15;

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';

                const size = Math.random() * 4 + 2;
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';

                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';

                const duration = Math.random() * 20 + 20;
                const delay = Math.random() * 2;

                particle.style.animation = `floatParticle ${duration}s linear ${delay}s infinite`;

                container.appendChild(particle);
            }
        }

        // ========== INICIALIZAÇÃO ==========
        window.addEventListener('DOMContentLoaded', () => {
            createParticles();
            loadGuests();

            // Detectar URL base automaticamente se possível
            if (window.location.hostname !== 'localhost' && window.location.hostname !== '127.0.0.1') {
                const currentBaseUrl = window.location.origin + window.location.pathname.replace('qrcode.html', 'index-3d.html');
                baseUrlInput.value = currentBaseUrl;
            }
        });

        // Enter para gerar QR Code
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && document.getElementById('guestName') === document.activeElement) {
                generateQRCode();
            }
        });

        // Recriar partículas ao redimensionar
        window.addEventListener('resize', () => {
            const container = document.getElementById('particlesBg');
            container.innerHTML = '';
            createParticles();
        });
    </script>
</body>
</html>
